# Оркестрация всех сервисов приложения одним файлом.
#   db      — PostgreSQL (база данных из ЛР1)
#   redis   — брокер очереди и backend результатов для Celery
#   api     — основное FastAPI-приложение (порт 8000)
#   parser  — сервис-парсер, вызывается api по HTTP (порт 8001)
#   worker  — Celery-воркер, обрабатывает фоновые задачи парсинга
#   beat    — Celery beat, запускает периодические задачи (bonus)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon
      POSTGRES_DB: hackathon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Общие переменные окружения для всех Python-сервисов.
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg2://hackathon:hackathon@db:5432/hackathon
      PARSER_URL: http://parser:8001
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      parser:
        condition: service_started

  parser:
    build: .
    command: uvicorn parser.main:app --host 0.0.0.0 --port 8001
    environment:
      DATABASE_URL: postgresql+psycopg2://hackathon:hackathon@db:5432/hackathon
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://hackathon:hackathon@db:5432/hackathon
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A worker.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
